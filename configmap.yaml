apiVersion: v1
kind: ConfigMap
metadata:
  name: jobmatch-config
  namespace: jobmatch
data:
  # Database Configuration
  DB_HOST: "postgres"
  DB_PORT: "5432"
  DB_USER: "user"
  DB_PASSWORD: "password"
  
  # Service Configuration
  CONDITION_SERVICE_HOST: "condition-service"
  CONDITION_SERVICE_PORT: "8001"
  
  COMPANY_SERVICE_HOST: "company-service"
  COMPANY_SERVICE_PORT: "8000"
  
  PROJECT_SERVICE_HOST: "project-service"
  PROJECT_SERVICE_PORT: "8002"
  
  # Django Configuration
  DJANGO_DEBUG: "False"
  DJANGO_ALLOWED_HOSTS: "localhost,127.0.0.1,company-service"
  
  # FastAPI Configuration
  FASTAPI_DEBUG: "False"
  
  # Flask Configuration
  FLASK_ENV: "production"
  FLASK_DEBUG: "False"
