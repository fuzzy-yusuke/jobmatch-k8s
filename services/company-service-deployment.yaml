apiVersion: v1
kind: Service
metadata:
  name: company-service
  namespace: jobmatch
spec:
  selector:
    app: company-service
  ports:
    - port: 8000
      targetPort: 8000
  type: ClusterIP

---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: company-service
  namespace: jobmatch
spec:
  replicas: 2
  selector:
    matchLabels:
      app: company-service
  template:
    metadata:
      labels:
        app: company-service
    spec:
      containers:
      - name: company-service
        image: company-service:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8000
        env:
        - name: DATABASE_URL
          value: "postgresql://user:password@postgres:5432/company_db"
        - name: DEBUG
          value: "False"
        - name: DJANGO_SETTINGS_MODULE
          value: "company_service.settings"
        livenessProbe:
          httpGet:
            path: /
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5
        resources:
          requests:
            memory: "256Mi"
            cpu: "200m"
          limits:
            memory: "512Mi"
            cpu: "500m"
      initContainers:
      - name: wait-for-postgres
        image: busybox:1.28
        command: ['sh', '-c', 'until nc -z postgres 5432; do echo waiting for postgres; sleep 2; done;']
      - name: run-migrations
        image: company-service:latest
        imagePullPolicy: Never
        env:
        - name: DATABASE_URL
          value: "postgresql://user:password@postgres:5432/company_db"
        command: ["python", "manage.py", "migrate"]
